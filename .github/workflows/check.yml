name: Python Checks

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Check syntax errors
        run: python -m py_compile hello.py

      - name: Run the file
        run: python hello.py